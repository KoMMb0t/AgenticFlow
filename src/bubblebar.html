<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AgenticBubble</title>
<style>
  :root {
    --bg:      rgba(14, 14, 24, 0.92);
    --bg-card: rgba(28, 28, 44, 0.95);
    --bd:      rgba(140, 100, 255, 0.35);
    --txt:     #e8e8f2;
    --dim:     #9a9ab0;
    --accent:  #8c64ff;
    --accent2: #5c9dff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  html, body { background: #0e0e18; height: 100%; overflow: hidden; }

  /* sichtbare, schmale Scrollbalken (Chat-Verlauf etc.) */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(140,100,255,.4); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(140,100,255,.7); }

  #wrap { display: flex; height: 100%; gap: 6px; }
  body.dock-right #wrap { flex-direction: row-reverse; }

  /* ── Bubble-Leiste ── */
  #bar {
    width: 64px; height: 100%;
    background: var(--bg);
    border: 1px solid var(--bd);
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 0;
  }
  #drag {
    width: 36px; height: 14px; flex: 0 0 auto;
    -webkit-app-region: drag;
    cursor: grab; display: flex; align-items: center; justify-content: center;
  }
  #drag::before { content: ''; width: 22px; height: 4px; border-radius: 2px; background: var(--dim); opacity: .6; }

  #bubbles { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 8px 0; scrollbar-width: none; }
  #bubbles::-webkit-scrollbar { display: none; }

  .bubble {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: 2px solid transparent;
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s, border-color .12s;
    position: relative;
  }
  .bubble:hover  { transform: scale(1.12); }
  .bubble.active { border-color: #fff; }
  .bubble .tip {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: var(--bg-card); color: var(--txt); border: 1px solid var(--bd);
    padding: 3px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .12s;
  }
  body:not(.dock-right) .bubble .tip { left: 58px; }
  body.dock-right       .bubble .tip { right: 58px; }
  .bubble:hover .tip { opacity: 1; }

  .bar-btn {
    width: 34px; height: 34px; border-radius: 10px; flex: 0 0 auto;
    background: var(--bg-card); border: 1px solid var(--bd); color: var(--dim);
    font-size: 16px; cursor: pointer; margin-top: 6px;
  }
  .bar-btn:hover { color: var(--txt); border-color: var(--accent); }

  /* ── Chat-Panel ── */
  #panel {
    flex: 1; height: 100%;
    background: var(--bg);
    border: 1px solid var(--bd);
    border-radius: 16px;
    display: none; flex-direction: column; overflow: hidden;
  }
  #panel.open { display: flex; }

  #panel-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-bottom: 1px solid var(--bd);
    -webkit-app-region: drag;
  }
  #panel-head .ttl { color: var(--txt); font-size: 13px; font-weight: 600; flex: 1; }
  #panel-head button { -webkit-app-region: no-drag; background: none; border: none; color: var(--dim); font-size: 14px; cursor: pointer; }
  #panel-head button:hover { color: var(--txt); }

  #msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 88%; padding: 8px 11px; border-radius: 12px; font-size: 12.5px; line-height: 1.5; color: var(--txt); white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.bot  { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--bd); }
  .msg.err  { align-self: flex-start; background: rgba(200,60,60,.2); border: 1px solid rgba(200,60,60,.5); }
  .msg .src { display: block; margin-top: 6px; font-size: 11px; color: var(--accent2); }

  #quick { display: flex; gap: 6px; padding: 0 12px 8px; flex-wrap: wrap; }
  #quick button {
    background: var(--bg-card); border: 1px solid var(--bd); color: var(--dim);
    border-radius: 14px; padding: 4px 10px; font-size: 11px; cursor: pointer;
  }
  #quick button:hover { color: var(--txt); border-color: var(--accent); }

  #inp-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--bd); }
  #inp {
    flex: 1; background: var(--bg-card); border: 1px solid var(--bd); border-radius: 10px;
    color: var(--txt); font-size: 12.5px; padding: 8px 10px; resize: none; max-height: 110px;
    outline: none; font-family: inherit;
  }
  #send {
    width: 38px; border-radius: 10px; border: none; cursor: pointer; font-size: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
  }
  #send:disabled { opacity: .5; cursor: default; }

  /* ── Editor ── */
  #editor {
    position: absolute; inset: 0; background: rgba(0,0,0,.55);
    display: none; align-items: center; justify-content: center;
  }
  #editor.open { display: flex; }
  #editor .card {
    width: min(380px, 92%); max-height: 92%; overflow-y: auto;
    background: var(--bg); border: 1px solid var(--bd); border-radius: 14px; padding: 16px;
  }
  #editor h3 { color: var(--txt); font-size: 14px; margin-bottom: 12px; }
  #editor label { display: block; color: var(--dim); font-size: 11px; margin: 8px 0 3px; }
  #editor input, #editor select, #editor textarea {
    width: 100%; background: var(--bg-card); border: 1px solid var(--bd); border-radius: 8px;
    color: var(--txt); font-size: 12px; padding: 7px 9px; outline: none; font-family: inherit;
  }
  #editor textarea { min-height: 70px; resize: vertical; }
  #editor .row { display: flex; gap: 8px; }
  #editor .row > div { flex: 1; }
  #editor .btns { display: flex; gap: 8px; margin-top: 14px; }
  #editor .btns button { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid var(--bd); }
  #ed-save { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none !important; }
  #ed-cancel { background: var(--bg-card); color: var(--dim); }
  #ed-delete { background: rgba(200,60,60,.25); color: #ff9a9a; border-color: rgba(200,60,60,.5) !important; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="bar">
      <div id="drag" title="Verschieben"></div>
      <div id="bubbles"></div>
      <button class="bar-btn" id="add"  title="Neue Bubble">＋</button>
      <button class="bar-btn" id="dock" title="Seite wechseln">⇄</button>
    </div>

    <div id="panel">
      <div id="panel-head">
        <span class="ttl" id="panel-title">Bubble</span>
        <button id="edit"  title="Bubble bearbeiten">⚙</button>
        <button id="clear" title="Verlauf leeren">🗑</button>
        <button id="close" title="Schließen">✕</button>
      </div>
      <div id="msgs"></div>
      <div id="quick"></div>
      <div id="inp-row">
        <textarea id="inp" rows="1" placeholder="Nachricht…"></textarea>
        <button id="send">➤</button>
      </div>
    </div>
  </div>

  <div id="editor">
    <div class="card">
      <h3 id="ed-title">Bubble bearbeiten</h3>
      <div class="row">
        <div><label>Icon (Emoji)</label><input id="ed-icon" maxlength="4"></div>
        <div style="flex:3"><label>Name</label><input id="ed-name"></div>
      </div>
      <div class="row">
        <div>
          <label>Engine</label>
          <select id="ed-engine">
            <option value="claude">Claude</option>
            <option value="ollama">Ollama (offline)</option>
            <option value="perplexity">Perplexity</option>
            <option value="openrouter">OpenRouter</option>
          </select>
        </div>
        <div><label>Modell</label><input id="ed-model"></div>
      </div>
      <label>System-Prompt</label>
      <textarea id="ed-prompt"></textarea>
      <label>Temperatur (0–1)</label>
      <input id="ed-temp" type="number" min="0" max="1" step="0.1">
      <label>Schnellaktionen (eine pro Zeile: Label | Prompt)</label>
      <textarea id="ed-qa" placeholder="Zusammenfassen | Fasse das zusammen:"></textarea>
      <div class="btns">
        <button id="ed-delete">Löschen</button>
        <button id="ed-cancel">Abbrechen</button>
        <button id="ed-save">Speichern</button>
      </div>
    </div>
  </div>

<script src="bubblebar.js"></script>
</body>
</html>
